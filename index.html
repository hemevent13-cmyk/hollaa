<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me? ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hearts"></div>

<!-- PAGE 1 -->
<div class="card" id="page1">
  <h1>Do you love me? ❤️</h1>
  <button id="yesBtn">kanbghiik 💕</button>
  <button id="noBtn">awloo ma3ndich m3aak 😏</button>
  <div id="message"></div>
</div>

<!-- CHOICE PAGE -->
<div class="scene hidden" id="choicePage">
  <div class="bigHeart">❤️</div>
  <div class="typingText" id="typingText"></div>

  <div class="choiceButtons hidden" id="choiceButtons">
    <button class="choiceBtn" data-type="ronaldo">Ronaldo ⚽</button>
    <button class="choiceBtn" data-type="issam">Issam 👑</button>
    <button class="choiceBtn" data-type="messi">Messi 🐐</button>
  </div>
</div>

<!-- FINAL PAGE -->
<div class="scene hidden" id="finalPage">
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="photoReveal">
      <img src="your-image.jpg" class="loveImage">
      
<div class="photoText" 
     style="font-size:26px; 
            font-weight:bold; 
            color:white; 
            -webkit-text-stroke:1.5px #350c1c;
            text-shadow:-1px -1px 0 #ff4b91,
                        1px -1px 0 #ff4b91,
                       -1px  1px 0 #ff4b91,
                        1px  1px 0 #ff4b91;">
  salaam zin dyaliii hhhhh
</div>
    </div>
  </div>

  <div class="fullLetter hidden" id="fullLetter">
    <div class="letterHearts" id="letterHearts"></div>
    <div id="bigLetterText"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
